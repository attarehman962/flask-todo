<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Update Todo</title>

    <script>
      (function () {
        var t = localStorage.getItem("tb-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>

    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style/update.css') }}"
    />
  </head>
  <body>
    <nav>
      <a class="nav-brand" href="/">
        <div class="nav-icon">
          <svg
            viewBox="0 0 16 16"
            fill="none"
            stroke-width="2"
            stroke-linecap="round"
          >
            <path d="M3 4h10M3 8h10M3 12h6" />
          </svg>
        </div>
        <span class="brand-text">Taskboard</span>
      </a>

      <div style="display: flex; align-items: center; gap: 20px">
        <div class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
          <span class="toggle-label" id="toggle-label">Dark</span>
          <div class="toggle-track">
            <div class="toggle-thumb" id="toggle-thumb">
              <svg
                id="moon-icon"
                viewBox="0 0 16 16"
                fill="none"
                stroke="#0a0a0f"
                stroke-width="2"
                stroke-linecap="round"
              >
                <path d="M13 10A6 6 0 0 1 6 3a6 6 0 1 0 7 7z" />
              </svg>
              <svg
                id="sun-icon"
                viewBox="0 0 16 16"
                fill="none"
                stroke="#f4f4f0"
                stroke-width="2"
                stroke-linecap="round"
                style="display: none"
              >
                <circle cx="8" cy="8" r="3" />
                <path
                  d="M8 1v2M8 13v2M1 8h2M13 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4"
                />
              </svg>
            </div>
          </div>
        </div>

        <a href="/" class="nav-back">
          <svg
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
          >
            <path d="M10 3L5 8l5 5" />
          </svg>
          All Tasks
        </a>
      </div>
    </nav>

    <div class="page">
      <div class="breadcrumb">
        <a href="/">Tasks</a>
        <span class="sep">›</span>
        <span class="current">Edit Task</span>
      </div>

      <div class="form-card">
        <div class="card-header-row">
          <div>
            <div class="form-title">EDIT <span>TASK</span></div>
            <p class="form-subtitle">Make your changes below and save.</p>
          </div>
          <div class="edit-badge">Editing</div>
        </div>

        <div class="divider"></div>

        <form action="/update/{{ todo.SNo }}" method="POST">
          <div class="field-group">
            <label for="title">Title</label>
            <input
              type="text"
              id="title"
              name="title"
              value="{{ todo.title }}"
              required
            />
          </div>

          <div class="field-group">
            <label for="desc">Description</label>
            <textarea id="desc" name="desc" rows="4" required>
              {{ todo.desc }}</textarea
            >
          </div>

          <div class="actions">
            <button type="submit" class="btn-submit">
              <svg
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M13 2H5a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V5l-3-3z"
                />
                <path d="M9 2v4h4M6 9l2 2 4-4" />
              </svg>
              Save Changes
            </button>

            <a href="/" class="btn-back">
              <svg
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              >
                <path d="M10 3L5 8l5 5" />
              </svg>
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>

    <script>
      const html = document.documentElement;

      function applyTheme(theme) {
        html.setAttribute("data-theme", theme);
        document.getElementById("toggle-label").textContent =
          theme === "dark" ? "Dark" : "Light";
        document.getElementById("moon-icon").style.display =
          theme === "dark" ? "block" : "none";
        document.getElementById("sun-icon").style.display =
          theme === "light" ? "block" : "none";
        localStorage.setItem("tb-theme", theme);
      }

      function toggleTheme() {
        const current = html.getAttribute("data-theme");
        applyTheme(current === "dark" ? "light" : "dark");
      }

      applyTheme(localStorage.getItem("tb-theme") || "dark");
    </script>
  </body>
</html>
